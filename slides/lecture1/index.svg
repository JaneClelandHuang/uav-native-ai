<svg viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3fe0b0"/>
    </marker>
    <marker id="arrMuted" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4c5c6f"/>
    </marker>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Boundaries -->
  <rect x="20" y="45" width="540" height="625" rx="8" fill="none" stroke="#3a4756" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="720" y="45" width="540" height="625" rx="8" fill="none" stroke="#3a4756" stroke-width="1.5" stroke-dasharray="5 4"/>

  <rect x="48" y="28" width="290" height="30" rx="4" fill="#090d12"/>
  <text x="193" y="48" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="13" letter-spacing="1.5" fill="#63758a">DOCKER COMPOSE NETWORK</text>

  <rect x="748" y="28" width="200" height="30" rx="4" fill="#090d12"/>
  <text x="848" y="48" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="13" letter-spacing="1.5" fill="#63758a">HOST MACHINE</text>

  <!-- SITL -->
  <g>
    <rect x="60" y="85" width="460" height="130" rx="5" fill="#161d26" stroke="#237a5d" stroke-width="1.5"/>
    <circle cx="494" cy="107" r="4.5" fill="#3fe0b0" filter="url(#glow)"/>
    <rect x="78" y="99" width="88" height="20" rx="3" fill="#0d1219"/>
    <text x="122" y="113" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" letter-spacing="1" fill="#63758a">CONTAINER</text>
    <text x="78" y="150" font-size="21" font-weight="700" fill="#e9eef4">ArduPilot SITL</text>
    <text x="78" y="173" font-size="13.5" fill="#aab8c6">real flight firmware, simulated physics</text>
    <text x="78" y="196" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11.5" fill="#63758a">sim_vehicle.py --out=udpout:drone_backend:14550</text>
  </g>

  <path d="M290,215 L290,266" stroke="#4c5c6f" stroke-width="2" fill="none" marker-end="url(#arrMuted)"/>
  <text x="316" y="234" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="12" fill="#aab8c6">pymavlink / UDP</text>
  <text x="316" y="251" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#63758a">binds udpin:0.0.0.0:14550</text>

  <!-- drone_backend.py -->
  <g>
    <rect x="60" y="268" width="460" height="130" rx="5" fill="#161d26" stroke="#237a5d" stroke-width="1.5"/>
    <circle cx="494" cy="290" r="4.5" fill="#3fe0b0" filter="url(#glow)"/>
    <rect x="78" y="282" width="88" height="20" rx="3" fill="#0d1219"/>
    <text x="122" y="296" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" letter-spacing="1" fill="#63758a">CONTAINER</text>
    <text x="78" y="333" font-size="21" font-weight="700" fill="#e9eef4">drone_backend.py</text>
    <text x="78" y="356" font-size="13.5" fill="#3fe0b0" font-weight="600">the only pymavlink speaker</text>
    <text x="78" y="379" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11.5" fill="#63758a">single reader thread · one MQTT client</text>
  </g>

  <path d="M290,398 L290,449" stroke="#3fe0b0" stroke-width="2" fill="none" marker-end="url(#arrGreen)"/>
  <text x="316" y="417" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="12" fill="#3fe0b0">MQTT publish</text>
  <text x="316" y="434" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#63758a">uav/&lt;id&gt;/telemetry</text>

  <!-- Mosquitto -->
  <g>
    <rect x="60" y="451" width="460" height="130" rx="5" fill="#161d26" stroke="#237a5d" stroke-width="1.5"/>
    <circle cx="494" cy="473" r="4.5" fill="#3fe0b0" filter="url(#glow)"/>
    <rect x="78" y="465" width="88" height="20" rx="3" fill="#0d1219"/>
    <text x="122" y="479" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" letter-spacing="1" fill="#63758a">CONTAINER</text>
    <text x="78" y="516" font-size="21" font-weight="700" fill="#e9eef4">Mosquitto broker</text>
    <text x="78" y="539" font-size="13.5" fill="#aab8c6">eclipse-mosquitto:2</text>
    <rect x="78" y="551" width="188" height="21" rx="3" fill="#0d1219" stroke="#8a5c17"/>
    <text x="172" y="566" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#f3a83c">1883/tcp → published to host</text>
  </g>

  <!-- matplotlib_view.py -->
  <g>
    <rect x="760" y="100" width="460" height="170" rx="5" fill="#161d26" stroke="#237a5d" stroke-width="1.5"/>
    <circle cx="1194" cy="122" r="4.5" fill="#3fe0b0" filter="url(#glow)"/>
    <rect x="778" y="114" width="122" height="20" rx="3" fill="#0d1219"/>
    <text x="839" y="128" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" letter-spacing="1" fill="#63758a">HOST PROCESS</text>
    <text x="778" y="167" font-size="21" font-weight="700" fill="#e9eef4">matplotlib_view.py</text>
    <rect x="778" y="180" width="150" height="22" rx="3" fill="#12281f"/>
    <text x="853" y="195.5" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="12" fill="#3fe0b0" font-weight="600">STAGE 1 — BUILD NOW</text>
    <text x="778" y="228" font-size="13.5" fill="#aab8c6">position plot + altitude gauge</text>
    <text x="778" y="250" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11.5" fill="#63758a">paho-mqtt + matplotlib · own venv, no pymavlink</text>
  </g>

  <!-- new-gui.py (future) -->
  <g opacity="0.62">
    <rect x="760" y="440" width="460" height="150" rx="5" fill="#161d26" stroke="#3a4756" stroke-width="1.5" stroke-dasharray="4 4"/>
    <circle cx="1194" cy="462" r="4.5" fill="#63758a"/>
    <rect x="778" y="454" width="122" height="20" rx="3" fill="#0d1219"/>
    <text x="839" y="468" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" letter-spacing="1" fill="#63758a">HOST PROCESS</text>
    <text x="778" y="507" font-size="21" font-weight="700" fill="#aab8c6">new-gui.py</text>
    <rect x="778" y="520" width="130" height="22" rx="3" fill="#1c232c"/>
    <text x="843" y="535.5" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="12" fill="#63758a" font-weight="600">STAGE 2 — LATER</text>
    <text x="778" y="570" font-size="13.5" fill="#63758a">tile-based map, click-to-goto</text>
  </g>

  <!-- MQTT lines crossing the gap -->
  <path d="M520,516 C 640,516 640,185 760,185" stroke="#3fe0b0" stroke-width="2.5" fill="none" marker-end="url(#arrGreen)"/>
  <path d="M520,516 C 640,516 640,515 760,515" stroke="#3fe0b0" stroke-width="2.5" fill="none" stroke-dasharray="6 5" opacity="0.55" marker-end="url(#arrGreen)"/>

  <!-- boundary-crossing callout, sits on top of the lines by design -->
  <rect x="570" y="316" width="140" height="84" rx="5" fill="#090d12" stroke="#8a5c17" stroke-width="1.3"/>
  <text x="640" y="336" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" letter-spacing="0.4" fill="#f3a83c" font-weight="600">ONLY MQTT</text>
  <text x="640" y="354" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" letter-spacing="0.4" fill="#f3a83c" font-weight="600">(TCP :1883)</text>
  <text x="640" y="372" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" letter-spacing="0.4" fill="#f3a83c" font-weight="600">CROSSES THIS</text>
  <text x="640" y="390" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" letter-spacing="0.4" fill="#f3a83c" font-weight="600">BOUNDARY</text>

  <!-- Legend -->
  <g font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="12.5" fill="#aab8c6">
    <line x1="60" y1="705" x2="96" y2="705" stroke="#3fe0b0" stroke-width="2.5"/>
    <text x="106" y="709">MQTT — crosses the host/container boundary</text>

    <line x1="480" y1="705" x2="516" y2="705" stroke="#4c5c6f" stroke-width="2"/>
    <text x="526" y="709">pymavlink / UDP — internal only, never exposed</text>

    <rect x="900" y="697" width="16" height="16" rx="3" fill="none" stroke="#3a4756" stroke-dasharray="3 3"/>
    <text x="926" y="709">not yet built (Stage 2+)</text>
  </g>
</svg>
