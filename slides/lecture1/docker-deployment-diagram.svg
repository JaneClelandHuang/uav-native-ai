<svg viewBox="0 0 1280 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrGreen2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#3fe0b0"/>
    </marker>
  </defs>

  <!-- Docker Compose network boundary -->
  <rect x="20" y="55" width="860" height="410" rx="8" fill="none" stroke="#3a4756" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="48" y="38" width="360" height="30" rx="4" fill="#090d12"/>
  <text x="228" y="58" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="13" letter-spacing="1.2" fill="#63758a">DOCKER COMPOSE NETWORK</text>

  <!-- Host machine boundary -->
  <rect x="920" y="55" width="340" height="410" rx="8" fill="none" stroke="#3a4756" stroke-width="1.5" stroke-dasharray="5 4"/>
  <rect x="948" y="38" width="200" height="30" rx="4" fill="#090d12"/>
  <text x="1048" y="58" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="13" letter-spacing="1.2" fill="#63758a">HOST MACHINE</text>

  <!-- sitl container -->
  <g>
    <rect x="48" y="95" width="255" height="345" rx="5" fill="#161d26" stroke="#237a5d" stroke-width="1.5"/>
    <circle cx="285" cy="117" r="4.5" fill="#3fe0b0"/>
    <rect x="64" y="109" width="88" height="20" rx="3" fill="#0d1219"/>
    <text x="108" y="123" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10" letter-spacing="1" fill="#63758a">CONTAINER</text>
    <text x="64" y="162" font-size="19" font-weight="700" fill="#e9eef4">sitl</text>
    <text x="64" y="185" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" fill="#aab8c6">ghcr.io/.../uav-course-sitl</text>
    <text x="64" y="200" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" fill="#aab8c6">:copter-4.6.3</text>
    <line x1="64" y1="215" x2="278" y2="215" stroke="#202a35" stroke-width="1"/>
    <text x="64" y="238" font-size="12.5" fill="#63758a">sim_vehicle.py</text>
    <text x="64" y="258" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" fill="#63758a">--custom-location=$SITL_LOCATION</text>
    <text x="64" y="276" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" fill="#3fe0b0">--out=udpout:drone_backend:14550</text>
    <rect x="64" y="299" width="220" height="24" rx="3" fill="#0d1219" stroke="#3a4756"/>
    <text x="174" y="315.5" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#63758a">no ports published</text>
    <text x="64" y="349" font-size="12" fill="#63758a">tty + stdin_open: true</text>
    <text x="64" y="367" font-size="11.5" fill="#63758a">(docker compose attach sitl)</text>
  </g>

  <!-- drone_backend container -->
  <g>
    <rect x="323" y="95" width="255" height="345" rx="5" fill="#161d26" stroke="#237a5d" stroke-width="1.5"/>
    <circle cx="560" cy="117" r="4.5" fill="#3fe0b0"/>
    <rect x="339" y="109" width="88" height="20" rx="3" fill="#0d1219"/>
    <text x="383" y="123" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10" letter-spacing="1" fill="#63758a">CONTAINER</text>
    <text x="339" y="162" font-size="19" font-weight="700" fill="#e9eef4">drone_backend</text>
    <text x="339" y="185" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11.5" fill="#aab8c6">build: Dockerfile.backend</text>
    <line x1="339" y1="202" x2="553" y2="202" stroke="#202a35" stroke-width="1"/>
    <text x="339" y="225" font-size="12.5" fill="#63758a">binds udpin:0.0.0.0:14550</text>
    <rect x="339" y="240" width="225" height="46" rx="3" fill="#0d1219" stroke="#8a5c17"/>
    <text x="349" y="257" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" fill="#f3a83c">volumes: ./backend:/app</text>
    <text x="349" y="273" font-size="11" fill="#aab8c6">edit .py, restart container —</text>
    <text x="349" y="284" font-size="11" fill="#aab8c6">no image rebuild needed</text>
    <text x="339" y="335" font-size="12" fill="#63758a">the only pymavlink speaker</text>
  </g>

  <!-- mosquitto container -->
  <g>
    <rect x="598" y="95" width="255" height="345" rx="5" fill="#161d26" stroke="#237a5d" stroke-width="1.5"/>
    <circle cx="835" cy="117" r="4.5" fill="#3fe0b0"/>
    <rect x="614" y="109" width="88" height="20" rx="3" fill="#0d1219"/>
    <text x="658" y="123" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10" letter-spacing="1" fill="#63758a">CONTAINER</text>
    <text x="614" y="162" font-size="19" font-weight="700" fill="#e9eef4">mosquitto</text>
    <text x="614" y="185" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11.5" fill="#aab8c6">eclipse-mosquitto:2</text>
    <line x1="614" y1="202" x2="828" y2="202" stroke="#202a35" stroke-width="1"/>
    <text x="614" y="225" font-size="12.5" fill="#63758a">docker/mosquitto.conf</text>
    <text x="614" y="245" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#63758a">listener 1883</text>
    <text x="614" y="262" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#63758a">allow_anonymous true</text>
    <rect x="614" y="285" width="220" height="24" rx="3" fill="#0d1219" stroke="#8a5c17"/>
    <text x="724" y="301.5" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11.5" fill="#f3a83c">1883/tcp → published to host</text>
    <text x="614" y="335" font-size="12" fill="#63758a">only crossing this boundary</text>
  </g>

  <!-- matplotlib_view.py host box -->
  <g>
    <rect x="948" y="95" width="285" height="345" rx="5" fill="#161d26" stroke="#237a5d" stroke-width="1.5"/>
    <circle cx="1210" cy="117" r="4.5" fill="#3fe0b0"/>
    <rect x="964" y="109" width="122" height="20" rx="3" fill="#0d1219"/>
    <text x="1025" y="123" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10" letter-spacing="1" fill="#63758a">HOST PROCESS</text>
    <text x="964" y="162" font-size="19" font-weight="700" fill="#e9eef4">matplotlib_view.py</text>
    <text x="964" y="185" font-size="12.5" fill="#aab8c6">your own venv</text>
    <line x1="964" y1="202" x2="1218" y2="202" stroke="#202a35" stroke-width="1"/>
    <text x="964" y="225" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#63758a">client/requirements.txt</text>
    <text x="964" y="245" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#63758a">paho-mqtt + matplotlib</text>
    <text x="964" y="265" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#63758a">(no pymavlink on host at all)</text>
    <text x="964" y="335" font-size="12" fill="#63758a">connects to localhost:1883</text>
  </g>

  <!-- crossing arrow: short, direct, no longer crosses over any other container -->
  <path d="M853,297 L 942,297" stroke="#3fe0b0" stroke-width="2.5" fill="none" marker-end="url(#arrGreen2)"/>
  <text x="897" y="285" text-anchor="middle" font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="10.5" fill="#f3a83c" font-weight="600">MQTT</text>

  <!-- legend -->
  <g font-family="ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace" font-size="12" fill="#aab8c6">
    <rect x="20" y="470" width="14" height="14" rx="2" fill="#161d26" stroke="#237a5d"/>
    <text x="42" y="482">3 containers, 1 compose network</text>
    <rect x="330" y="470" width="14" height="14" rx="2" fill="#0d1219" stroke="#8a5c17"/>
    <text x="352" y="482">published port / bind mount — the only host-visible surface</text>
  </g>
</svg>
